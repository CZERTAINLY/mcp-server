name: "Check PR"
on:
  pull_request:
    branches: [main*]

concurrency:
  group: pr-${{ github.event.pull_request.number || github.ref }}-build-pr
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'push'
    name: Build
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
      - name: Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: mvn -B -U verify

      # Package up PR context for downstream workflow_run
      - name: Prepare PR context artifact
        run: |
          cat > pr-context.json <<'JSON'
          {
            "pr_number": "${{ github.event.pull_request.number }}",
            "head_sha":  "${{ github.event.pull_request.head.sha }}",
            "head_repo": "${{ github.event.pull_request.head.repo.full_name }}",
            "head_branch": "${{ github.event.pull_request.head.ref }}",
            "base_ref": "${{ github.event.pull_request.base.ref }}",
            "run_id": "${{ github.run_id }}"
          }
          JSON
          cat pr-context.json

      # Upload PR context
      - name: Upload PR context
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-context
          path: pr-context.json
          retention-days: 1
          if-no-files-found: error

      # Upload compiled classes
      - name: Upload Compiled Classes
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: compiled-classes
          path: target/classes
          retention-days: 1

      # Upload Jacoco XML report(s)
      - name: Upload Coverage Reports
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-reports
          path: target/site/jacoco/jacoco.xml
          retention-days: 1
